<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 400 346" width="400" height="346">
  <defs>
    <!-- OneNote purple (left) → Obsidian violet (right) -->
    <linearGradient id="bgGrad" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#7719AA"/>
      <stop offset="100%" stop-color="#6C3AED"/>
    </linearGradient>
    <!-- 3D node gradient (top-left light, bottom-right shadow) -->
    <radialGradient id="node1" cx="35%" cy="30%" r="65%">
      <stop offset="0%" stop-color="#ffffff"/>
      <stop offset="100%" stop-color="#c4b5fd"/>
    </radialGradient>
    <radialGradient id="node2" cx="35%" cy="30%" r="65%">
      <stop offset="0%" stop-color="#ffffff"/>
      <stop offset="100%" stop-color="#a78bfa"/>
    </radialGradient>
    <radialGradient id="node3" cx="35%" cy="30%" r="65%">
      <stop offset="0%" stop-color="#ffffff"/>
      <stop offset="100%" stop-color="#ddd6fe"/>
    </radialGradient>
    <!-- Glow filter for nodes -->
    <filter id="glow">
      <feGaussianBlur stdDeviation="2" result="blur"/>
      <feMerge>
        <feMergeNode in="blur"/>
        <feMergeNode in="SourceGraphic"/>
      </feMerge>
    </filter>
    <!-- Drop shadow for 3D depth -->
    <filter id="shadow">
      <feDropShadow dx="1" dy="2" stdDeviation="1.5" flood-color="#2e1065" flood-opacity="0.4"/>
    </filter>
  </defs>

  <!-- Flat-top hexagon -->
  <polygon points="116,28 284,28 368,173 284,318 116,318 32,173"
           fill="url(#bgGrad)" stroke="#3B0764" stroke-width="2.5" stroke-linejoin="round"/>

  <!-- Knowledge graph edges (back layer, subtle depth) -->
  <!-- Deep/far edges (thinner, more transparent) -->
  <line x1="145" y1="78" x2="250" y2="65" stroke="white" stroke-width="1.4" opacity="0.35"/>
  <line x1="250" y1="65" x2="310" y2="100" stroke="white" stroke-width="1.4" opacity="0.35"/>
  <line x1="145" y1="78" x2="100" y2="120" stroke="white" stroke-width="1.5" opacity="0.4"/>
  <line x1="250" y1="65" x2="200" y2="120" stroke="white" stroke-width="1.5" opacity="0.4"/>
  <line x1="310" y1="100" x2="290" y2="150" stroke="white" stroke-width="1.5" opacity="0.4"/>

  <!-- Mid-depth edges -->
  <line x1="100" y1="120" x2="200" y2="120" stroke="white" stroke-width="1.8" opacity="0.5"/>
  <line x1="200" y1="120" x2="290" y2="150" stroke="white" stroke-width="1.8" opacity="0.5"/>
  <line x1="100" y1="120" x2="80" y2="185" stroke="white" stroke-width="1.8" opacity="0.5"/>
  <line x1="200" y1="120" x2="155" y2="175" stroke="white" stroke-width="1.8" opacity="0.5"/>
  <line x1="200" y1="120" x2="250" y2="185" stroke="white" stroke-width="1.8" opacity="0.5"/>
  <line x1="290" y1="150" x2="320" y2="185" stroke="white" stroke-width="1.8" opacity="0.5"/>
  <line x1="290" y1="150" x2="250" y2="185" stroke="white" stroke-width="1.8" opacity="0.5"/>

  <!-- Front edges (thicker, more visible) -->
  <line x1="80" y1="185" x2="155" y2="175" stroke="white" stroke-width="2.2" opacity="0.65"/>
  <line x1="155" y1="175" x2="250" y2="185" stroke="white" stroke-width="2.2" opacity="0.65"/>
  <line x1="250" y1="185" x2="320" y2="185" stroke="white" stroke-width="2.2" opacity="0.65"/>
  <line x1="80" y1="185" x2="130" y2="235" stroke="white" stroke-width="2.2" opacity="0.65"/>
  <line x1="155" y1="175" x2="130" y2="235" stroke="white" stroke-width="2.2" opacity="0.65"/>
  <line x1="155" y1="175" x2="200" y2="240" stroke="white" stroke-width="2.2" opacity="0.65"/>
  <line x1="250" y1="185" x2="200" y2="240" stroke="white" stroke-width="2.2" opacity="0.65"/>
  <line x1="250" y1="185" x2="285" y2="235" stroke="white" stroke-width="2.2" opacity="0.65"/>
  <line x1="320" y1="185" x2="285" y2="235" stroke="white" stroke-width="2.2" opacity="0.65"/>
  <line x1="130" y1="235" x2="200" y2="240" stroke="white" stroke-width="2.5" opacity="0.7"/>
  <line x1="200" y1="240" x2="285" y2="235" stroke="white" stroke-width="2.5" opacity="0.7"/>

  <!-- Nodes: back layer (small, muted = farther away) -->
  <circle cx="145" cy="78" r="7" fill="url(#node3)" opacity="0.7" filter="url(#shadow)"/>
  <circle cx="250" cy="65" r="6" fill="url(#node3)" opacity="0.65" filter="url(#shadow)"/>
  <circle cx="310" cy="100" r="6.5" fill="url(#node3)" opacity="0.65" filter="url(#shadow)"/>

  <!-- Nodes: mid layer -->
  <circle cx="100" cy="120" r="9" fill="url(#node2)" opacity="0.85" filter="url(#shadow)"/>
  <circle cx="200" cy="120" r="11" fill="url(#node1)" opacity="0.9" filter="url(#shadow)"/>
  <circle cx="290" cy="150" r="9.5" fill="url(#node2)" opacity="0.85" filter="url(#shadow)"/>

  <!-- Nodes: front layer (large, bright = closer) -->
  <circle cx="80" cy="185" r="10" fill="url(#node1)" opacity="0.92" filter="url(#glow)"/>
  <circle cx="155" cy="175" r="13" fill="url(#node1)" opacity="0.95" filter="url(#glow)"/>
  <circle cx="250" cy="185" r="14" fill="url(#node1)" opacity="0.97" filter="url(#glow)"/>
  <circle cx="320" cy="185" r="9" fill="url(#node2)" opacity="0.88" filter="url(#glow)"/>
  <circle cx="130" cy="235" r="10" fill="url(#node1)" opacity="0.93" filter="url(#glow)"/>
  <circle cx="200" cy="240" r="12" fill="url(#node1)" opacity="0.95" filter="url(#glow)"/>
  <circle cx="285" cy="235" r="10.5" fill="url(#node1)" opacity="0.93" filter="url(#glow)"/>

  <!-- Bottom: OneNote → Obsidian -->
  <rect x="138" y="272" width="28" height="32" rx="3" ry="3"
        fill="none" stroke="white" stroke-width="2"/>
  <text x="152" y="296" text-anchor="middle" font-family="Segoe UI, Arial, sans-serif"
        font-size="20" font-weight="700" fill="white">N</text>

  <line x1="178" y1="288" x2="208" y2="288" stroke="white" stroke-width="2.5" stroke-linecap="round"/>
  <polygon points="208,283 218,288 208,293" fill="white"/>

  <path d="M 245,272 L 258,283 L 255,302 L 245,308 L 235,302 L 232,283 Z"
        fill="none" stroke="white" stroke-width="2" stroke-linejoin="round"/>
  <path d="M 245,272 L 245,308 M 232,283 L 258,283"
        fill="none" stroke="white" stroke-width="1.2" opacity="0.7"/>
</svg>
